<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --board-bg: #1a1a1a;
      --grid: #2a2a2a;
      --text: #e0e0e0;
      --accent: #00ff88;
      --accent-dim: #00ff8833;
      --cell-size: min(5.5vw, 28px);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .game-wrapper {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .board-container {
      position: relative;
    }

    canvas {
      display: block;
      border: 2px solid var(--accent);
      box-shadow: 0 0 20px var(--accent-dim), inset 0 0 40px rgba(0,255,136,0.04);
      image-rendering: pixelated;
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 140px;
    }

    .panel-box {
      background: var(--board-bg);
      border: 1px solid var(--grid);
      padding: 12px 14px;
    }

    .panel-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .panel-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    #next-canvas {
      display: block;
      margin-top: 4px;
      image-rendering: pixelated;
    }

    .controls-hint {
      font-size: 9px;
      line-height: 1.8;
      color: #666;
    }

    .controls-hint strong {
      color: #888;
    }

    /* Overlays */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(13,13,13,0.88);
      z-index: 10;
    }

    .overlay.hidden { display: none; }

    .overlay-title {
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 8px;
      text-shadow: 0 0 30px var(--accent);
      margin-bottom: 16px;
    }

    .overlay-sub {
      font-size: 12px;
      color: #888;
      letter-spacing: 1px;
    }

    .overlay-score {
      font-size: 18px;
      font-weight: 700;
      margin: 12px 0;
    }

    /* Mobile touch controls */
    .touch-controls {
      display: none;
      gap: 8px;
      margin-top: 16px;
    }

    .touch-btn {
      background: var(--board-bg);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: inherit;
      font-size: 20px;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      border-radius: 4px;
    }

    .touch-btn:active { background: var(--accent-dim); }

    @media (pointer: coarse) {
      .touch-controls { display: flex; }
    }

    @media (max-width: 600px) {
      :root { --cell-size: min(8vw, 22px); }
      .game-wrapper { gap: 12px; }
      .side-panel { min-width: 100px; gap: 10px; }
      .panel-value { font-size: 16px; }
    }
  </style>
</head>
<body>

<div class="game-wrapper">
  <div class="board-container">
    <canvas id="board"></canvas>

    <!-- Start overlay -->
    <div class="overlay" id="start-overlay">
      <div class="overlay-title">TETRIS</div>
      <div class="overlay-sub">PRESS SPACE TO START</div>
      <div class="overlay-score" id="start-high-score"></div>
    </div>

    <!-- Pause overlay -->
    <div class="overlay hidden" id="pause-overlay">
      <div class="overlay-title">PAUSED</div>
      <div class="overlay-sub">PRESS P TO RESUME</div>
    </div>

    <!-- Game over overlay -->
    <div class="overlay hidden" id="gameover-overlay">
      <div class="overlay-title" style="color:#f00000;text-shadow:0 0 30px #f00000;">GAME OVER</div>
      <div class="overlay-score" id="final-score"></div>
      <div class="overlay-sub">PRESS R OR CLICK TO RESTART</div>
    </div>
  </div>

  <div class="side-panel">
    <div class="panel-box">
      <div class="panel-label">Score</div>
      <div class="panel-value" id="score">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">Level</div>
      <div class="panel-value" id="level">1</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">Lines</div>
      <div class="panel-value" id="lines">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">Next</div>
      <canvas id="next-canvas"></canvas>
    </div>
    <div class="panel-box controls-hint">
      <div class="panel-label" style="margin-bottom:8px;">Controls</div>
      <strong>←→</strong> Move<br>
      <strong>↓</strong> Soft drop<br>
      <strong>↑/X</strong> Rotate CW<br>
      <strong>Z/Ctrl</strong> Rotate CCW<br>
      <strong>Space</strong> Hard drop<br>
      <strong>P</strong> Pause
    </div>

    <div class="touch-controls">
      <button class="touch-btn" id="btn-left">◀</button>
      <button class="touch-btn" id="btn-down">▼</button>
      <button class="touch-btn" id="btn-right">▶</button>
      <button class="touch-btn" id="btn-rotate">↻</button>
      <button class="touch-btn" id="btn-drop">⬇</button>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ─── Constants ───────────────────────────────────────────────────────────
  const COLS = 10;
  const ROWS = 20;
  const CELL_SIZE = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-size')) || 28;

  const COLORS = {
    I: '#00f0f0',
    O: '#f0f000',
    T: '#a000f0',
    S: '#00f000',
    Z: '#f00000',
    J: '#0000f0',
    L: '#f0a000',
  };

  // Each tetromino: 4 rotation states, each state is [col, row] offsets from center
  const TETROS = {
    I: [
      [[0,1],[1,1],[2,1],[3,1]],
      [[2,0],[2,1],[2,2],[2,3]],
      [[0,2],[1,2],[2,2],[3,2]],
      [[1,0],[1,1],[1,2],[1,3]],
    ],
    O: [
      [[1,0],[2,0],[1,1],[2,1]],
      [[1,0],[2,0],[1,1],[2,1]],
      [[1,0],[2,0],[1,1],[2,1]],
      [[1,0],[2,0],[1,1],[2,1]],
    ],
    T: [
      [[1,0],[0,1],[1,1],[2,1]],
      [[1,0],[1,1],[2,1],[1,2]],
      [[0,1],[1,1],[2,1],[1,2]],
      [[1,0],[0,1],[1,1],[1,2]],
    ],
    S: [
      [[1,0],[2,0],[0,1],[1,1]],
      [[1,0],[1,1],[2,1],[2,2]],
      [[1,1],[2,1],[0,2],[1,2]],
      [[0,0],[0,1],[1,1],[1,2]],
    ],
    Z: [
      [[0,0],[1,0],[1,1],[2,1]],
      [[2,0],[1,1],[2,1],[1,2]],
      [[0,1],[1,1],[1,2],[2,2]],
      [[1,0],[0,1],[1,1],[0,2]],
    ],
    J: [
      [[0,0],[0,1],[1,1],[2,1]],
      [[1,0],[2,0],[1,1],[1,2]],
      [[0,1],[1,1],[2,1],[2,2]],
      [[1,0],[1,1],[0,2],[1,2]],
    ],
    L: [
      [[2,0],[0,1],[1,1],[2,1]],
      [[1,0],[1,1],[1,2],[2,2]],
      [[0,1],[1,1],[2,1],[0,2]],
      [[0,0],[1,0],[1,1],[1,2]],
    ],
  };

  const PIECE_TYPES = Object.keys(TETROS);
  const SCORES = { 1: 100, 2: 300, 3: 500, 4: 800 };

  // ─── Canvas setup ────────────────────────────────────────────────────────
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  canvas.width = COLS * CELL_SIZE;
  canvas.height = ROWS * CELL_SIZE;

  const nextCanvas = document.getElementById('next-canvas');
  const nextCtx = nextCanvas.getContext('2d');
  nextCanvas.width = 4 * CELL_SIZE;
  nextCanvas.height = 4 * CELL_SIZE;

  // ─── DOM refs ────────────────────────────────────────────────────────────
  const scoreEl = document.getElementById('score');
  const levelEl = document.getElementById('level');
  const linesEl = document.getElementById('lines');
  const startOverlay = document.getElementById('start-overlay');
  const pauseOverlay = document.getElementById('pause-overlay');
  const gameoverOverlay = document.getElementById('gameover-overlay');
  const finalScoreEl = document.getElementById('final-score');
  const startHighScoreEl = document.getElementById('start-high-score');

  // ─── State ───────────────────────────────────────────────────────────────
  let board = [];          // 2D array: null or color string
  let currentPiece = null; // { type, rot, x, y }
  let nextPieceType = null;
  let score = 0;
  let level = 1;
  let lines = 0;
  let gameOver = false;
  let paused = false;
  let running = false;
  let dropTimer = null;
  let lastDrop = 0;
  let highScore = parseInt(localStorage.getItem('tetris-high') || '0');

  // ─── Board helpers ───────────────────────────────────────────────────────
  function createBoard() {
    board = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  }

  function valid(piece, dx, dy, drot) {
    const rot = (piece.rot + drot + 4) % 4;
    const cells = TETROS[piece.type][rot];
    for (const [cx, cy] of cells) {
      const nx = piece.x + cx + dx;
      const ny = piece.y + cy + dy;
      if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
      if (ny >= 0 && board[ny][nx]) return false;
    }
    return true;
  }

  function lockPiece() {
    const rot = currentPiece.rot;
    const cells = TETROS[currentPiece.type][rot];
    for (const [cx, cy] of cells) {
      const nx = currentPiece.x + cx;
      const ny = currentPiece.y + cy;
      if (ny >= 0) board[ny][nx] = COLORS[currentPiece.type];
    }
    clearLines();
    spawnPiece();
  }

  function clearLines() {
    let cleared = 0;
    for (let r = ROWS - 1; r >= 0; ) {
      if (board[r].every(c => c !== null)) {
        board.splice(r, 1);
        board.unshift(Array(COLS).fill(null));
        cleared++;
      } else {
        r--;
      }
    }
    if (cleared > 0) {
      lines += cleared;
      score += (SCORES[cleared] || 0) * level;
      level = Math.floor(lines / 10) + 1;
      updateUI();
      flashBoard();
    }
  }

  let flashFrame = 0;
  function flashBoard() {
    flashFrame = 6;
  }

  // ─── Piece spawning ──────────────────────────────────────────────────────
  function randomPieceType() {
    return PIECE_TYPES[Math.floor(Math.random() * PIECE_TYPES.length)];
  }

  function spawnPiece() {
    const type = nextPieceType || randomPieceType();
    nextPieceType = randomPieceType();
    currentPiece = { type, rot: 0, x: 3, y: -1 };

    if (!valid(currentPiece, 0, 0, 0)) {
      endGame();
    }
  }

  // ─── Movement ────────────────────────────────────────────────────────────
  function moveLeft()  { if (valid(currentPiece, -1, 0, 0)) { currentPiece.x--; return true; } return false; }
  function moveRight() { if (valid(currentPiece,  1, 0, 0)) { currentPiece.x++; return true; } return false; }
  function moveDown()  {
    if (valid(currentPiece, 0, 1, 0)) {
      currentPiece.y++;
      score += 1;
      updateUI();
      return true;
    }
    return false;
  }

  function rotateCW()  { if (valid(currentPiece, 0, 0,  1)) currentPiece.rot = (currentPiece.rot + 1) % 4; }
  function rotateCCW()  { if (valid(currentPiece, 0, 0, -1)) currentPiece.rot = (currentPiece.rot + 3) % 4; }

  function hardDrop() {
    let dropDist = 0;
    while (valid(currentPiece, 0, 1, 0)) {
      currentPiece.y++;
      dropDist++;
    }
    score += dropDist * 2;
    updateUI();
    lockPiece();
  }

  // ─── Ghost piece ─────────────────────────────────────────────────────────
  function ghostY() {
    let gy = currentPiece.y;
    while (true) {
      const rot = currentPiece.rot;
      const cells = TETROS[currentPiece.type][rot];
      let ok = true;
      for (const [cx, cy] of cells) {
        const nx = currentPiece.x + cx;
        const ny = gy + cy + 1;
        if (nx < 0 || nx >= COLS || ny >= ROWS) { ok = false; break; }
        if (ny >= 0 && board[ny][nx]) { ok = false; break; }
      }
      if (!ok) break;
      gy++;
    }
    return gy;
  }

  // ─── Rendering ───────────────────────────────────────────────────────────
  function drawCell(c, x, y, color, alpha) {
    const px = x * CELL_SIZE;
    const py = y * CELL_SIZE;
    c.save();
    c.globalAlpha = alpha !== undefined ? alpha : 1;
    c.fillStyle = color;
    c.fillRect(px + 1, py + 1, CELL_SIZE - 2, CELL_SIZE - 2);
    // Inner highlight
    c.fillStyle = 'rgba(255,255,255,0.25)';
    c.fillRect(px + 2, py + 2, CELL_SIZE - 6, 2);
    c.fillStyle = 'rgba(0,0,0,0.3)';
    c.fillRect(px + 2, py + CELL_SIZE - 4, CELL_SIZE - 4, 2);
    c.restore();
  }

  function drawBoard() {
    // Background
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid
    ctx.strokeStyle = '#2a2a2a';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath();
      ctx.moveTo(x * CELL_SIZE, 0);
      ctx.lineTo(x * CELL_SIZE, canvas.height);
      ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * CELL_SIZE);
      ctx.lineTo(canvas.width, y * CELL_SIZE);
      ctx.stroke();
    }

    // Locked cells
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (board[r][c]) {
          drawCell(ctx, c, r, board[r][c]);
        }
      }
    }

    // Ghost piece
    if (currentPiece && running && !gameOver) {
      const gy = ghostY();
      const rot = currentPiece.rot;
      const cells = TETROS[currentPiece.type][rot];
      ctx.save();
      ctx.globalAlpha = 0.18;
      for (const [cx, cy] of cells) {
        const nx = currentPiece.x + cx;
        const ny = gy + cy;
        if (ny >= 0) drawCell(ctx, nx, ny, COLORS[currentPiece.type]);
      }
      ctx.restore();
    }

    // Active piece
    if (currentPiece && running && !gameOver) {
      const rot = currentPiece.rot;
      const cells = TETROS[currentPiece.type][rot];
      for (const [cx, cy] of cells) {
        const nx = currentPiece.x + cx;
        const ny = currentPiece.y + cy;
        if (ny >= 0) drawCell(ctx, nx, ny, COLORS[currentPiece.type]);
      }
    }

    // Flash effect
    if (flashFrame > 0) {
      ctx.save();
      ctx.globalAlpha = (flashFrame / 12) * 0.4;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
      flashFrame--;
    }
  }

  function drawNext() {
    nextCtx.fillStyle = '#1a1a1a';
    nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

    if (!nextPieceType) return;

    const cells = TETROS[nextPieceType][0];
    // Center the piece in 4x4 area
    let minC = Infinity, maxC = -Infinity, minR = Infinity, maxR = -Infinity;
    for (const [c, r] of cells) {
      minC = Math.min(minC, c); maxC = Math.max(maxC, c);
      minR = Math.min(minR, r); maxR = Math.max(maxR, r);
    }
    const spanC = maxC - minC + 1;
    const spanR = maxR - minR + 1;
    const offC = Math.floor((4 - spanC) / 2) - minC;
    const offR = Math.floor((4 - spanR) / 2) - minR;

    for (const [c, r] of cells) {
      const nc = c + offC;
      const nr = r + offR;
      drawCell(nextCtx, nc, nr, COLORS[nextPieceType]);
    }
  }

  function updateUI() {
    scoreEl.textContent = score;
    levelEl.textContent = level;
    linesEl.textContent = lines;
  }

  // ─── Game loop ────────────────────────────────────────────────────────────
  function dropSpeed() {
    return Math.max(100, 1000 - (level - 1) * 90);
  }

  function gameLoop(ts) {
    if (!running) return;

    if (paused || gameOver) {
      dropTimer = requestAnimationFrame(gameLoop);
      return;
    }

    if (ts - lastDrop > dropSpeed()) {
      if (!moveDown()) {
        lockPiece();
      }
      lastDrop = ts;
    }

    drawBoard();
    drawNext();
    dropTimer = requestAnimationFrame(gameLoop);
  }

  // ─── Start / Pause / End ─────────────────────────────────────────────────
  function startGame() {
    createBoard();
    score = 0;
    level = 1;
    lines = 0;
    gameOver = false;
    paused = false;
    running = true;
    nextPieceType = randomPieceType();
    spawnPiece();
    updateUI();
    startOverlay.classList.add('hidden');
    pauseOverlay.classList.add('hidden');
    gameoverOverlay.classList.add('hidden');
    lastDrop = performance.now();
    if (dropTimer) cancelAnimationFrame(dropTimer);
    dropTimer = requestAnimationFrame(gameLoop);
  }

  function togglePause() {
    if (gameOver || !running) return;
    paused = !paused;
    pauseOverlay.classList.toggle('hidden', !paused);
  }

  function endGame() {
    gameOver = true;
    running = false;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('tetris-high', highScore);
    }
    finalScoreEl.textContent = 'Score: ' + score + (score >= highScore ? ' ★ NEW HIGH!' : '');
    gameoverOverlay.classList.remove('hidden');
    drawBoard();
  }

  // ─── Input ───────────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (!running || gameOver) {
      if (e.code === 'Space' && !startOverlay.classList.contains('hidden') === false === false) {
        // start overlay not shown, ignore
      }
      return;
    }

    switch (e.code) {
      case 'ArrowLeft':  e.preventDefault(); moveLeft();  break;
      case 'ArrowRight': e.preventDefault(); moveRight(); break;
      case 'ArrowDown':  e.preventDefault(); moveDown();  break;
      case 'ArrowUp':
      case 'KeyX':       e.preventDefault(); rotateCW();  break;
      case 'KeyZ':
      case 'ControlLeft':
      case 'ControlRight': e.preventDefault(); rotateCCW(); break;
      case 'Space':      e.preventDefault(); hardDrop(); break;
      case 'KeyP':       e.preventDefault(); togglePause(); break;
    }
  });

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && !startOverlay.classList.contains('hidden')) {
      e.preventDefault();
      startGame();
    }
    if ((e.code === 'KeyR') && gameOver) {
      startGame();
    }
  });

  gameoverOverlay.addEventListener('click', () => {
    if (gameOver) startGame();
  });

  // Touch controls
  document.getElementById('btn-left').addEventListener('touchstart', e => { e.preventDefault(); if (running && !paused) moveLeft(); });
  document.getElementById('btn-right').addEventListener('touchstart', e => { e.preventDefault(); if (running && !paused) moveRight(); });
  document.getElementById('btn-down').addEventListener('touchstart', e => { e.preventDefault(); if (running && !paused) moveDown(); });
  document.getElementById('btn-rotate').addEventListener('touchstart', e => { e.preventDefault(); if (running && !paused) rotateCW(); });
  document.getElementById('btn-drop').addEventListener('touchstart', e => { e.preventDefault(); if (running && !paused) hardDrop(); });

  // Prevent scrolling on arrow keys
  window.addEventListener('keydown', e => {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) {
      e.preventDefault();
    }
  }, { passive: false });

  // ─── Init ────────────────────────────────────────────────────────────────
  function init() {
    createBoard();
    drawBoard();
    drawNext();
    if (highScore > 0) {
      startHighScoreEl.textContent = 'High Score: ' + highScore;
    }
  }

  init();

})();
</script>
</body>
</html>
